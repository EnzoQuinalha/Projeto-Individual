<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lies of P | Dashboard</title>

    <link rel="stylesheet" href="../css/dashboards.css">
    <link rel="stylesheet" href="../css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <!-- Scripts do Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="validarSessao(); exibirGraficoHumanidade();">

    <div class="janela">
        <div class="header-left">
            <h1>Lies of P</h1> <!-- Removido AquaTech -->

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
                <!-- Removido o campo de CPF, pois não existe no seu cadastro -->
            </div>

            <div class="btn-nav-white">
                <a href="./questionario.html">
                    <h3>Questionário</h3>
                </a>
            </div>

            <div class="btn-nav">
                <h3>Gráficos</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash">
            <div id="graficos">
                <div id="grafico_humanidade" class="display-block">
                    <h3 class="tituloGraficos">
                        <span id="titulo_status">Análise de Humanidade: Você vs. Comunidade</span>
                    </h3>
                    <div class="graph">
                        <canvas id="myChartCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function exibirGraficoHumanidade() {
        var idUsuario = sessionStorage.ID_USUARIO;

        // Rota que criamos no quizController.js[cite: 6]
        fetch(`/quiz/status/${idUsuario}`, { cache: 'no-store' }).then(function (res) {
            if (res.ok) {
                res.json().then(json => {
                    var dados = json[0];
                    
                    const ctx = document.getElementById('myChartCanvas').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Você', 'Comunidade (Média)'],
                            datasets: [{
                                label: 'Pontos de Humanidade',
                                data: [dados.pontuacao_user, dados.media_geral],
                                backgroundColor: ['#c5a059', '#32b9cd'], // Ouro e Azul Ergo
                                borderColor: '#fff',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: { 
                                    beginAtZero: true, 
                                    max: 100,
                                    ticks: { color: '#c5a059' } // Cor do texto no eixo Y
                                },
                                x: {
                                    ticks: { color: '#c5a059' } // Cor do texto no eixo X
                                }
                            },
                            plugins: {
                                legend: { display: false } // Remove legenda inútil para 2 barras
                            }
                        }
                    });
                });
            }
        }).catch(function (error) {
            console.error(`Erro na obtenção dos dados: ${error.message}`);
        });
    }
</script>
