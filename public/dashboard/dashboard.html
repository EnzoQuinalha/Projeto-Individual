<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lies of P | Dashboard</title>

    <link rel="stylesheet" href="../css/dashboards.css">
    <link rel="stylesheet" href="../css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <!-- Scripts do Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="validarSessao(); obterDadosGraficoHumanidade();">

    <div class="janela">
        <div class="header-left">
            <h1 class="titulo"><img src="../assets/img/LoPLogo.png" alt="Logo Lies of P"></h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./questionario.html">
                    <h3>Questionário</h3>
                </a>
            </div>

            <div class="btn-nav">
                <h3>Gráficos</h3>
            </div>

            <div class="btn-nav-white">
                <a href="tierlist.html">
                    <h3>Tierlist</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash" >
            <div id="graficos">
                <div id="graficoQuiz" class="graficoQuiz">
                    <div id="grafico_humanidade" class="display-block grafico_humanidade">
                        <h3 class="tituloGraficos">
                            <span id="titulo_status">Análise de Humanidade: Você vs. Comunidade</span>
                        </h3>
                        <div class="graph">
                            <canvas id="myChartCanvas"></canvas>
                        </div>
                    </div>
                    <div id="kpis" class="kpis">
                        <div id="kpiDelta" class="kpiDelta">
                            Delta
                        </div>

                        <div id="kpiPercentil" class="kpiPercentil">
                            Percentil
                        </div>
                    </div>
                </div>

                <div id="graficoTier" class="graficoTier">
                        <ul id="ranking" class="ranking"></ul>

                    <div id="favoritos" class="favoritos">
                        <div id="favoritoCom" class="favoritoCom"></div>
                        <div id="favoritoUser" class="favoritoUser"></div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>
<style>
    .favoritos{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-top: 10px;
        padding: 10px;
        background-color: #49494e;
        text-align: center;
        border-radius: 15px;
        box-shadow: 3px 3px 3px black;
    }
    
    
</style>
</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    
    let chartHumanidade; // Variável para segurar a instância do gráfico
    let timerAtualizacaoHumanidade; // Variável para controlar o loop, se for usar

    function obterDadosGraficoHumanidade() {
        var idUsuario = sessionStorage.ID_USUARIO;

        if(timerAtualizacaoHumanidade != undefined){
            clearTimeout(timerAtualizacaoHumanidade)
        }

        fetch(`/quiz/status/${idUsuario}`, {cache: 'no-store'}).then(function (res) {
            if(res.ok){
                res.json().then(json => {
                    var dados_recebidos = json[0]

                    plotarGraficoHumanidade(dados_recebidos, idUsuario)
                    plotarPercentil(idUsuario)
                    carregarRanking(idUsuario)
                })
            }
        }).catch(function (error) {
            console.error(`Erro na obtenção dos dados: ${error.message}`)
        })
    }

    function plotarGraficoHumanidade(dados, idUsuario) {
        const ctx = document.getElementById('myChartCanvas').getContext('2d');

        if(chartHumanidade){
            chartHumanidade.destroy()
        }

        chartHumanidade = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Você', 'Comunidade (Média)'],
                datasets: [{
                    label: 'Pontos de Humanidade',
                    data: [dados.pontuacao_user, dados.media_geral],
                    backgroundColor: ['#c5a059', '#32b9cd'], // Ouro e Azul Ergo
                    borderColor: '#fff',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        ticks: { color: '#c5a059' } // Cor do texto no eixo Y
                    },
                    x: {
                        ticks: { color: '#c5a059' } // Cor do texto no eixo X
                    }
                },
                plugins: {
                    legend: { display: false }, // Remove legenda inútil para 2 barras
                    tooltip: {
                        enabled: true,
                        animation: false,  // Desabilita a animação do tooltip
                    }
                }
            }
        });

        let conta = dados.pontuacao_user - dados.media_geral
        conta = Math.round(conta)
        if(conta > 0){
            kpiDelta.innerHTML = `Pontos acima da multidão: <br><p><b style="font-size: 50px; color: #0078d7">+${conta}</b></p>`
        }else if(conta < 0){
            kpiDelta.innerHTML = `Pontos abaixo da multidão: <br><p><b style="font-size: 50px; color: #d93d4a">${conta}</b></p>`
        }else{
            kpiDelta.innerHTML = `No meio da multidão <br><p><b style="font-size: 50px; color: #d93d4a">${conta}</b></p>`
        }



        timerAtualizacaoHumanidade = setTimeout(() => atualizarGraficoHumanidade(idUsuario), 10000)
    }

    function atualizarGraficoHumanidade(idUsuario) {

        fetch(`/quiz/status/${idUsuario}`, {cache: 'no-store'}).then(function (res) {
            if(res.ok){
                res.json().then(json => {
                    var novos_dados = json[0]

                    if(novos_dados.media_geral != chartHumanidade.data.datasets[0].data[1]){
                        chartHumanidade.data.datasets[0].data = [novos_dados.pontuacao_user, novos_dados.media_geral]
                        chartHumanidade.update()
                    }

                    let conta = novos_dados.pontuacao_user - novos_dados.media_geral
                    conta = Math.round(conta)
                    if(conta > 0){
                        kpiDelta.innerHTML = `Pontos acima da multidão: <br><p><b style="font-size: 50px; color: #0078d7">+${conta}</b></p>`
                    }else if(conta < 0){
                        kpiDelta.innerHTML = `Pontos abaixo da multidão: <br><p><b style="font-size: 50px; color: #d93d4a">${conta}</b></p>`
                    }else{
                        kpiDelta.innerHTML = `No meio da multidão <br><p><b style="font-size: 50px; color: #d93d4a">${conta}</b></p>`
                    }

                    plotarPercentil(idUsuario)
                    timerAtualizacaoHumanidade = setTimeout(() => atualizarGraficoHumanidade(idUsuario), 10000)
                })
            }
        }).catch(function (error) {
            console.error(`Erro na obtenção dos dados: ${error.message}`)
        })
    }

    function plotarPercentil(idUsuario){

        fetch(`/quiz/percentil/${idUsuario}`, {cache: 'no-store'}).then(function (res) {
            if(res.ok){
                res.json().then(json => {
                    var percentil = json[0].percentil
                    percentil = Math.round(percentil)
                    percentil = 100 - percentil
                    if(percentil == 0){
                        percentil = 1
                    }
                    kpiPercentil.innerHTML = `<p><b style="font-size: 50px;">Top ${percentil}%</b></p>`
                })
            }
        }).catch(function (error) {
            console.error(`Erro na obtencao dos dados`)
        })
    }

    function carregarRanking(idUsuario){

        fetch(`/tierlist/listar`, {cache: 'no-store'}).then(function (res) {
            if(res.ok){
                res.json().then(json => {
                    var favCom = json[0].boss
                    ranking.innerHTML = '<li><span class="tituloRank">Top 10 Bosses</span></li>'

                    for(let i = 0; i < 10; i++){
                        ranking.innerHTML += `<li class='rank'><span>${i+1}º ${json[i].boss}</span> <span>${json[i].pontos}</span></li>`
                    }

                    favoritoCom.innerHTML = `<span style="color: #c5a059; font-size: 30px">Boss favorito da comunidade: </span><br>`
                    favoritoCom.innerHTML += `<span style="font-size: 20px; font-weight: bold">${favCom}</span>`
                    favoritoCom.innerHTML += `<br><img src="../assets/img/bosses/${json[0].tag}.jpg" alt="${json[0].boss}">`
                })
            }
        }).catch(function (error) {
            console.error(`Erro na obtencao dos dados`)
        })

        fetch(`/tierlist/listar/${idUsuario}`,  {cache: 'no-store'}).then(function (res) {
            if(res.ok){
                res.json().then(json => {
                    var favUser = json[0].boss

                    favoritoUser.innerHTML = `<span style="color: #0078d7; font-size: 30px">Seu Boss favorito: </span><br>`
                    favoritoUser.innerHTML += `<span style="font-size: 20px; font-weight: bold">${favUser}</span>`
                    favoritoUser.innerHTML += `<br><img src="../assets/img/bosses/${json[0].tag}.jpg" alt="${json[0].boss}">`
                })
            }
        }).catch(function (error) {
            console.error(`Erro na obtencao dos dados`)
        })
    }
</script>
