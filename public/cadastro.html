<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaTech | Cadastro</title>
  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
</head>

<body onload="">
  <div class="header">
    <div class="container">
      <h1 class="titulo"><img src="assets/img/LoPLogo.png" alt="Logo Lies of P"></h1>
      <ul class="navbar">
        <li><a href="index.html">Inicial</a></li>
        <li><a href="simulador.html">Simulador</a></li>
        <li>|</li>
        <li><a href="login.html">Login</a></li>
        <li class="agora"><a href="#">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>
        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="container">
      <h4>Feito com amor por aluno &hearts; SPTech &copy; 2023</h4>
      <span class="version">v1.0.0</span>
    </div>
  </div>
</body>

</html>

<script>
  function cadastrar() {
    // Recupere os valores das inputs
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      exibirErro("Preencha todos os campos para prosseguir");
      return false;
    } else if (nomeVar.length <= 1) {
      exibirErro("O nome deve ter pelo menos dois caracteres");
      return false;
    } else if (!emailVar.includes("@") || !emailVar.includes(".")) {
      exibirErro("Email inválido");
      return false;
    } else if (senhaVar.length < 6) {
      exibirErro("A senha deve ter pelo menos 6 caracteres");
      return false;
    } else if (confirmacaoSenhaVar != senhaVar) {
      exibirErro("As senhas não coincidem");
      return false;
    }

    // Enviando os dados para o servidor
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "Cadastro realizado com sucesso! Redirecionando...";

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (erro) {
        console.log(`#ERRO: ${erro}`);
      });

    return false;
  }

  function exibirErro(mensagem) {
    cardErro.style.display = "block";
    mensagem_erro.innerHTML = mensagem;
    setTimeout(sumirMensagem, 5000);
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
